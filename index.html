<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>How to study 2 — Deck</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">How to study 2</div>
      <div class="controls">
        <button id="prevBtn" aria-label="Previous slide">◀</button>
        <button id="nextBtn" aria-label="Next slide">▶</button>
      </div>
    </header>

    <main class="stage">
      <section id="slide" class="slide" role="group" aria-roledescription="slide" aria-label="Slide content">
        <!-- slides injected here -->
      </section>
    </main>

    <footer class="footer">
      <div id="progress" class="progress">
        <div id="progressBar" class="progressBar"></div>
      </div>
      <div class="meta">
        <div id="slideIndex">0 / 0</div>
        <button id="toggleNotes" class="notesBtn">Show speaker line</button>
      </div>
    </footer>
  </div>

  <script>
    // Basic accessibility helpers: trap focus on buttons for small screens
    (function(){
      document.addEventListener('keydown', function(e){
        if(e.key === 'ArrowRight') document.getElementById('nextBtn').click();
        if(e.key === 'ArrowLeft') document.getElementById('prevBtn').click();
      });
    })();
  </script>
  <script src="app.js"></script>
</body>
</html>
